  h1 { color: #58a6ff; margin-bottom: 8px; font-size: 20px; }

  .controls { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
  .controls button { background: #238636; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; }
  .controls button:hover { background: #2ea043; }
  .controls button.secondary { background: #30363d; }
  .controls button.secondary:hover { background: #484f58; }
  #output { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-top: 12px; display: none; white-space: pre-wrap; font-size: 12px; color: #7ee787; max-height: 300px; overflow-y: auto; }

  table { border-collapse: collapse; width: 100%; margin-bottom: 24px; }
  th { background: #161b22; color: #58a6ff; text-align: left; padding: 8px 10px; border-bottom: 2px solid #30363d; font-size: 12px; position: sticky; top: 0; }
  td { padding: 6px 10px; border-bottom: 1px solid #21262d; font-size: 13px; }
  tr:hover { background: #161b22; }
  .league-header { background: #1c2128; padding: 10px 12px; margin-top: 16px; margin-bottom: 0; border-radius: 6px 6px 0 0; border: 1px solid #30363d; border-bottom: none; }
  .league-header h2 { color: #f0883e; font-size: 15px; display: inline; }
  .league-header .tag { background: #30363d; color: #8b949e; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 8px; }
  .league-table { border: 1px solid #30363d; border-radius: 0 0 6px 6px; overflow: hidden; margin-bottom: 20px; }

  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  a:visited { color: #bc8cff; }

  input.time-input {
    background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 13px;
    width: 100px; text-align: center;
  }
  input.time-input:focus { border-color: #58a6ff; outline: none; }
  input.time-input.filled { border-color: #238636; background: #0d1b12; }

  .delta { font-size: 12px; color: #8b949e; min-width: 60px; }
  .delta.good { color: #7ee787; }
  .delta.warn { color: #f0883e; }
  .delta.bad { color: #f85149; }

  .est-start { color: #8b949e; }
  .exp-exp { color: #c9d1d9; }
</style>

  { league: "ATP", mapped: true, matchup: "Shapovalov vs VdZ", date: "Mar 17", expExpPT: "11:00 AM", expExpUTC: "2026-03-17T18:00:00Z", url: "https://kalshi.com/events/KXATPMATCH-26MAR17SHAVAN" },

function parseTimePT(str) {
  // Parse "7:00 PM" or "12:15 AM" into minutes since midnight
  if (!str) return null;
  str = str.trim().toUpperCase();
  const m = str.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/);
  if (!m) return null;
  let h = parseInt(m[1]), min = parseInt(m[2]), ampm = m[3];
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

function minutesToStr(mins) {
  const h = Math.floor(Math.abs(mins) / 60);
  const m = Math.abs(mins) % 60;
  return `${h}h ${m}m`;
}

function computeDelta(expExpPT, actualPT) {
  const exp = parseTimePT(expExpPT);
  const act = parseTimePT(actualPT);
  if (exp === null || act === null) return null;
  return exp - act; // positive = expiration is after start (expected)
}

function updateDelta(idx) {
  const input = document.getElementById(`time-${idx}`);
  const deltaEl = document.getElementById(`delta-${idx}`);
  const val = input.value.trim();

  if (!val) {
    deltaEl.textContent = '';
    deltaEl.className = 'delta';
    input.classList.remove('filled');
    return;
  }
  input.classList.add('filled');

  const d = computeDelta(events[idx].expExpPT, val);
  if (d === null) {
    deltaEl.textContent = 'parse err';
    deltaEl.className = 'delta bad';
    return;
  }
  const str = minutesToStr(d);
  deltaEl.textContent = `+${str}`;
  if (d >= 120 && d <= 240) deltaEl.className = 'delta good';      // 2-4h: expected range
  else if (d >= 60 && d <= 360) deltaEl.className = 'delta warn';  // 1-6h: plausible
  else deltaEl.className = 'delta bad';                              // outside range

  save();
}

function save() {
  const data = {};
  events.forEach((e, i) => {
    const v = document.getElementById(`time-${i}`).value.trim();
    if (v) data[i] = v;
  });
  localStorage.setItem('startTimeData', JSON.stringify(data));
}

function load() {
  try {
    const data = JSON.parse(localStorage.getItem('startTimeData') || '{}');
    Object.entries(data).forEach(([i, v]) => {
      const input = document.getElementById(`time-${i}`);
      if (input) { input.value = v; updateDelta(parseInt(i)); }
    });
  } catch(e) {}
}

function clearAll() {
  if (!confirm('Clear all entered times?')) return;
  events.forEach((_, i) => {
    document.getElementById(`time-${i}`).value = '';
    document.getElementById(`delta-${i}`).textContent = '';
    document.getElementById(`delta-${i}`).className = 'delta';
    document.getElementById(`time-${i}`).classList.remove('filled');
  });
  localStorage.removeItem('startTimeData');
}

function exportData() {
  const results = [];
  events.forEach((e, i) => {
    const actual = document.getElementById(`time-${i}`).value.trim();
    if (!actual) return;
    const d = computeDelta(e.expExpPT, actual);
    results.push({
      league: e.league,
      matchup: e.matchup,
      date: e.date,
      expected_expiration_pt: e.expExpPT,
      actual_start_pt: actual,
      delta_minutes: d,
    });
  });
  const text = JSON.stringify(results, null, 2);
  navigator.clipboard.writeText(text).then(() => {
    const out = document.getElementById('output');
    out.style.display = 'block';
    out.textContent = `Copied ${results.length} entries!\n\n${text}`;
  });
}

function toggleOutput() {
  const out = document.getElementById('output');
  out.style.display = out.style.display === 'none' ? 'block' : 'none';
}

function render() {
  const container = document.getElementById('tables');
  const leagues = [...new Set(events.map(e => e.league))];

  leagues.forEach(league => {
    const leagueEvents = events.map((e, i) => ({...e, idx: i})).filter(e => e.league === league);
    const mapped = leagueEvents[0].mapped;

    const header = document.createElement('div');
    header.className = 'league-header';
    header.innerHTML = `<h2>${league}</h2><span class="tag">${mapped ? 'has external provider' : 'UNMAPPED - needs fallback'}</span> <span class="tag">${leagueEvents.length} events</span>`;
    container.appendChild(header);

    const wrapper = document.createElement('div');
    wrapper.className = 'league-table';
    const table = document.createElement('table');
    table.innerHTML = `<tr>
      <th>Matchup</th>
      <th>Date</th>
      <th>Exp. Expiration (PT)</th>
      <th>Actual Start (PT)</th>
      <th>Delta</th>
      <th>Kalshi</th>
    </tr>`;

    leagueEvents.forEach(e => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${e.matchup}</td>
        <td>${e.date}</td>
        <td class="exp-exp">${e.expExpPT}</td>
        <td><input class="time-input" id="time-${e.idx}" type="text" placeholder="0:00 AM" oninput="updateDelta(${e.idx})" onblur="updateDelta(${e.idx})"></td>
        <td><span class="delta" id="delta-${e.idx}"></span></td>
        <td><a href="${e.url}" target="_blank">open</a></td>
      `;
      table.appendChild(tr);
    });

    wrapper.appendChild(table);
    container.appendChild(wrapper);
  });

  load();
}

render();
